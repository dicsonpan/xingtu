name = "xingtu"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "xingtu-db"
database_id = "da574d22-6324-48c4-a8c9-2cc7b95a9e31"

# 敏感变量请勿写在此处，请在 Cloudflare Dashboard 中设置为 Encrypted 环境变量：
#   Settings → Environment variables → Add variable → Type: Secret
# 需要设置的变量：
#   JWT_SECRET      — JWT 签名密钥（随机长字符串）
#   ADMIN_INIT_KEY  — 管理员初始化密钥

[ai]
binding = "AI"
